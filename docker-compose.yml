services:
  iptv-agent:
    image: ghcr.io/davchien/iptv-agent:latest
    container_name: iptv-agent
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      # 如需自定义配置，在当前目录创建 config.yaml 后取消下行注释：
      # - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
