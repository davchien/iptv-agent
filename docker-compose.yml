services:
  iptv-agent:
    image: ghcr.io/davchien/iptv-agent:latest
    container_name: iptv-agent
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro   # 允许自定义配置
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
