version: '3.8'

services:
  iptv-agent:
    build: .
    container_name: iptv-agent
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data  # 持久化频道数据和播放列表
      - ./config.yaml:/app/config.yaml  # 可选：挂载自定义配置
    environment:
      - IPTVAgent_FULL_UPDATE_INTERVAL=43200  # 12小时
      - IPTVAgent_TEST_TIMEOUT=8
      - IPTVAgent_SERVER_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
