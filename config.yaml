# iptv-agent 配置文件
# 所有时间单位：秒（除非另有说明）

# ============================================================
# 源频道列表配置
# ============================================================
# =========================================================
# 标准频道表配置（官方直连基准）
# =========================================================
standard_channels:
  # 是否使用标准频道表（从 migu_video 社区的 interface.txt 获取官方直连）
  # 启用时直接解析 interface.txt 中的 M3U8 格式，按 standard_channels.json 匹配
  # 注意: 咪咕API需要 ddCalcu + Wasm 加密，纯Python无法直接调用
  #       所以我们使用社区已完成的输出 (interface.txt)，而非直接调API
  enabled: true
  # 标准频道表路径（频道名基准）
  file: "src/standard_channels.json"
  # interface.txt 拉取地址（社区每天多次更新）
  m3u_urls:
    - "https://raw.githubusercontent.com/develop202/migu_video/main/interface.txt"
    - "https://gh-proxy.com/https://raw.githubusercontent.com/develop202/migu_video/main/interface.txt"
  # 是否分析流信息（分辨率等），推荐关闭以加速首次启动
  analyze_streams: false
  # 跳过测速，直接将 interface.txt 匹配到的频道全部输出（不做连通性检测）
  skip_testing: true
  # 咪咕代理地址（部署 qqt8520/migu2026 Docker 容器后使用）
  # docker run -d -p 6001:6001 --name migu2026 qqt8520/migu2026:1.0
  # 设置后跳过 interface.txt，直接用代理生成实时鉴权流地址
  # 格式: http://IP:6001，留空则使用 interface.txt 静态URL模式
  migu_proxy_url: "http://localhost:6001"

sources:
  # 内置 M3U 源（支持多个）
  - name: "咪咕官方频道列表"
    type: "m3u"
    url: "https://raw.githubusercontent.com/develop202/migu_video/main/interface.txt"
    enabled: true
    update_interval: 43200  # 12小时，单位：秒

  - name: "ChinaIPTV 自动更新"
    type: "m3u"
    url: "https://raw.githubusercontent.com/hujingguang/ChinaIPTV/main/cnTV_AutoUpdate.m3u8"
    enabled: true
    update_interval: 43200

  - name: "vbskycn IPTV"
    type: "m3u"
    url: "https://raw.githubusercontent.com/vbskycn/iptv/refs/heads/master/tv/iptv4.m3u"
    enabled: true
    update_interval: 43200

  # 网页抓取源（动态获取直连URL）
  - name: "网页抓取示例"
    type: "web_scrape"
    url: ""  # 留空则禁用，填写目标页面URL启用
    selector: ""  # CSS选择器或正则表达式
    enabled: false
    update_interval: 86400  # 24小时

# ============================================================
# 频道更新配置
# ============================================================
scheduler:
  # 全量更新周期（秒）
  full_update_interval: 43200  # 12小时
  # 启动时是否立即执行一次全量更新
  run_on_startup: true
  # 并发测试频道数（同时测试几个频道）
  test_concurrency: 10
  # 同域名并发限制（防止触发限流，推荐2-3）
  domain_concurrency: 2
  # 每个URL测试超时（秒）
  test_timeout: 8
  # 每个URL测速读取字节数（0=不测速，65536=64KB）
  test_bytes: 65536
  # 批次间延迟（秒），进一步降低限流风险
  inter_batch_delay: 1.0
  # 频道间延迟（秒），0=无延迟（已有域名限流保护）
  inter_channel_delay: 0

# ============================================================
# 重定向服务配置
# ============================================================
server:
  host: "0.0.0.0"
  port: 8000
  # 路由前缀
  route_prefix: ""

# ============================================================
# 限流配置（防止滥用）
# ============================================================
ratelimit:
  # 每个IP每秒最大请求数（令牌桶算法）
  requests_per_second: 2
  # 令牌桶容量
  bucket_capacity: 5
  # 是否启用限流
  enabled: true

# ============================================================
# 输出配置
# ============================================================
output:
  # 输出目录（相对于工作目录）
  dir: "./data"
  # M3U 文件名
  m3u_filename: "playlist.m3u"
  # TXT 文件名
  txt_filename: "playlist.txt"
  # 是否按分组排序
  sort_by_group: true
  # 是否只输出有效频道
  only_valid: true

# ============================================================
# 日志配置
# ============================================================
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "json"  # json 或 text
  file: ""  # 留空则输出到stdout

# ============================================================
# 安全配置
# ============================================================
security:
  # API密钥（可选，留空则不验证）
  api_key: ""
  # IP白名单（可选，留空则允许所有）
  ip_whitelist: []
